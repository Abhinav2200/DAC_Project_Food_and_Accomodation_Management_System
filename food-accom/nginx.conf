server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # Proxy for Spring Boot Backend (Owner/User API)
    # Maps /api/spring/... -> http://spring-backend:8080/...
    location /api/spring/ {
        proxy_pass http://spring-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy for Admin Service (.NET)
    # Maps /api/admin/... -> http://admin-service:8080/api/admin/...
    location /api/admin/ {
        proxy_pass http://admin-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
